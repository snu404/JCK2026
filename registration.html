<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JCK MEMS/NEMS 2026 Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">

  <!-- PayPal SDK: Sandbox test mode -->
  <script src="https://www.paypal.com/sdk/js?client-id=ARu69dyAiptrZUSyjtQXgB6iCg3YuPoh1dZHgv7a6XjKq94Zp-fUeMxAscx3npDauPvYT-ouTQFwoWFs&currency=USD&components=buttons&disable-funding=paylater,venmo"></script>
 
  <script type="module" src="app.js"></script>
</head>
<body>

  <div class="container">

    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">JCK MEMS/NEMS 2026 Registration</h2>
      <button type="button" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <h3>Registration Form</h3>

      <label for="participantType">Participant Type</label>
      <select id="participantType">
        <option value="domestic">Domestic</option>
        <option value="international">International</option>
      </select>

      <label for="registrationType">Registration Type</label>
      <select id="registrationType">
        <option value="student">Student</option>
        <option value="regular">Regular</option>
        <option value="vip">VIP / Invited</option>
      </select>

      <label for="fullName">Full Name</label>
      <input id="fullName" placeholder="Full name">

      <label for="affiliation">Affiliation</label>
      <input id="affiliation" placeholder="Affiliation">

      <label for="regEmail">Email</label>
      <input id="regEmail" placeholder="Email">

      <label for="phone">Phone</label>
      <input id="phone" placeholder="Phone number">

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" onclick="saveRegistrationDraft()">Save Registration</button>
        <button type="button" onclick="loadMyRegistrations()">Load My Registrations</button>
      </div>
    </div>

    <div class="card">
      <h3>My Registration Records</h3>
      <div id="myRegistrations"></div>
    </div>

    <div class="card">
      <h3>Payment</h3>

      <div style="padding:12px; background:#f7f7f7; border-radius:8px; margin-bottom:14px;">
        <div><strong>Participant:</strong> <span id="payParticipantType">Domestic</span></div>
        <div><strong>Registration:</strong> <span id="payRegistrationType">Student</span></div>
        <div><strong>Amount:</strong> <span id="payAmount">USD 150.00</span></div>
      </div>

      <p style="color:#666;">
        This is currently running in PayPal Sandbox test mode.
        All registration payments are processed in USD via PayPal.
      </p>

      <div id="paypal-button-container"></div>
      <div id="paymentStatus" style="margin-top:14px; color:#444;"></div>
    </div>

  </div>

</body>
</html>
