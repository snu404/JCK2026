<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | JCK MEMS/NEMS 2026</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js"></script>
</head>
<body>

  <div class="container">

    <div class="card">
      <h2>JCK MEMS/NEMS 2026 Admin Panel</h2>
      <p class="subtitle">Manage abstract submissions and review submission data.</p>

      <button onclick="loadPapers()">Load Papers</button>
    </div>

    <div class="card">
      <h3>Submitted Papers</h3>
      <div style="overflow-x:auto;">
        <table id="table">
          <tr>
            <th>Paper ID</th>
            <th>Title</th>
            <th>Status</th>
            <th>Preference</th>
            <th>Presenter</th>
            <th>Email</th>
          </tr>
        </table>
      </div>
    </div>

  </div>

</body>
</html>
