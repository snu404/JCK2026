<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | JCK MEMS/NEMS 2026</title>

  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js"></script>
</head>

<body>
  <div class="container">

    <div class="card">
      <h2>JCK MEMS/NEMS 2026 Admin Panel</h2>
      <p class="subtitle">Manage abstract submissions and registration records.</p>
    </div>
    
    <div class="card">
      <h3>Paper Submissions</h3>
    
      <input id="searchInput" placeholder="Search papers by title / presenter / email">
    
      <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <button type="button" onclick="loadPapers()">Load Papers</button>
        <button type="button" onclick="searchPapers()">Search Papers</button>
    
        <label style="display:flex; align-items:center; gap:6px; margin-left:8px;">
          <input type="checkbox" id="showUnregisteredOnly">
          Show only unregistered presenters
        </label>
      </div>
    
      <div style="overflow-x:auto; margin-top:16px;">
        <table id="table">
          <tr>
            <th>Paper ID</th>
            <th>Title</th>
            <th>Status</th>
            <th>Preference</th>
            <th>Presenter</th>
            <th>Email</th>
            <th>Registration</th>
            <th>Action</th>
          </tr>
        </table>
      </div>
    </div>
    
    <div class="card">
      <h3>Conference Registrations</h3>

      <input id="registrationSearchInput" placeholder="Search registrations by name / email / affiliation">

      <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" onclick="loadRegistrations()">Load Registrations</button>
        <button type="button" onclick="searchRegistrations()">Search Registrations</button>
      </div>

      <div style="overflow-x:auto; margin-top:16px;">
        <table id="registrationTable">
          <tr>
            <th>Registration ID</th>
            <th>Name</th>
            <th>Affiliation</th>
            <th>Email</th>
            <th>Participant</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </table>
      </div>
    </div>

  </div>
</body>
</html>
