<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JCK MEMS/NEMS 2026 Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js"></script>
</head>
<body>

  <div class="container">

    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">JCK MEMS/NEMS 2026 Registration</h2>
      <button type="button" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <h3>Registration Form</h3>

      <label for="participantType">Participant Type</label>
      <select id="participantType">
        <option value="domestic">Domestic</option>
        <option value="international">International</option>
      </select>

      <label for="registrationType">Registration Type</label>
      <select id="registrationType">
        <option value="student">Student</option>
        <option value="regular">Regular</option>
        <option value="vip">VIP</option>
      </select>

      <label for="fullName">Full Name</label>
      <input id="fullName" placeholder="Full name">

      <label for="affiliation">Affiliation</label>
      <input id="affiliation" placeholder="Affiliation">

      <label for="regEmail">Email</label>
      <input id="regEmail" placeholder="Email">

      <label for="phone">Phone</label>
      <input id="phone" placeholder="Phone number">

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" onclick="saveRegistrationDraft()">Save Registration</button>
        <button type="button" onclick="loadMyRegistrations()">Load My Registrations</button>
      </div>
    </div>

    <div class="card">
      <h3>My Registration Records</h3>
      <div id="myRegistrations"></div>
    </div>

    <div class="card">
      <h3>Payment</h3>
      <p style="color:#666; margin:0;">
        Payment integration will be enabled later. Your registration information can be saved now.
      </p>
    </div>

  </div>

</body>
</html>
